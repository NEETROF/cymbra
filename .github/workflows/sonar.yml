name: sonar

# SonarCloud analysis (Rust + Dart, both natively supported).
# Requires the SONAR_TOKEN repository secret (set by a maintainer) and a
# SonarCloud project. Adjust organization/projectKey in sonar-project.properties.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate blame/new-code detection
      # Coverage must exist before the scan. Regenerate Rust + Flutter (unit/widget +
      # integration) lcov here; the hard 80% gate lives in rust.yml / flutter.yml.
      # Sonar stays non-blocking (no qualitygate.wait) — PR decoration only.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev ninja-build libgtk-3-dev clang cmake pkg-config xvfb
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Rust coverage
        run: cargo llvm-cov --workspace --lcov --output-path target/lcov.info --ignore-filename-regex 'frb_generated|/lib\.rs|/midi\.rs|/musicxml\.rs'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Activate Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Generate code (riverpod_generator + freezed)
        run: melos run generate
      - name: Flutter coverage (unit + widget)
        run: melos run test
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Flutter coverage (integration)
        working-directory: apps/music
        run: xvfb-run -a flutter test integration_test -d linux --coverage --coverage-path coverage/integration.lcov.info
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
