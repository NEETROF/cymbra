name: sonar

# SonarCloud analysis (Rust + Dart, both natively supported).
# Requires the SONAR_TOKEN repository secret (set by a maintainer) and a
# SonarCloud project. Adjust organization/projectKey in sonar-project.properties.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write # Required for Sonar to decorate the PR with analysis results

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate blame/new-code detection
      # Coverage must exist before the scan. Regenerate Rust + Flutter (unit/widget +
      # integration) lcov here; the hard 80% gate lives in rust.yml / flutter.yml.
      # Sonar stays non-blocking (no qualitygate.wait) — PR decoration only.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev ninja-build libgtk-3-dev clang cmake pkg-config xvfb protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Rust coverage
        run: >-
          cargo llvm-cov --workspace --lcov --output-path target/lcov.info
          --ignore-filename-regex 'frb_generated|cymbra\.(auth|user)\.v1|/lib\.rs|/main\.rs|/midi\.rs|/musicxml\.rs|/audio\.rs|/grpc\.rs|/pg\.rs|/creds_pg\.rs|/verifier\.rs|/telemetry\.rs|/metrics\.rs|/cache\.rs|/email\.rs|/db\.rs|/jwks\.rs|/interceptor\.rs|/logging\.rs|/session\.rs'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Activate Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Generate gRPC stubs (protoc)
        run: melos run gen-grpc
      - name: Generate code (riverpod_generator + freezed)
        run: melos run generate
      - name: Flutter coverage (unit + widget)
        run: melos run test
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Flutter coverage (integration)
        working-directory: apps/music
        run: xvfb-run -a flutter test integration_test -d linux --coverage --coverage-path coverage/integration.lcov.info
      - name: SonarCloud scan (blocks on Quality Gate)
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          # Wait for SonarCloud to compute the Quality Gate and fail the job if
          # it does not pass — makes Sonar a blocking gate.
          args: -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
