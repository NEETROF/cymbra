name: rust

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ALSA (midir backend)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # cargo-llvm-cov runs the tests AND measures coverage, failing the job under
      # 80% line coverage. The generated bridge, the Android JNI entrypoint (lib.rs)
      # and the hardware/thread MIDI glue (api/midi.rs) can't run on a headless CI
      # host, so they're excluded. The pure, testable logic lives in api/midi_core.rs
      # (still measured), alongside score.rs and simple.rs.
      - name: Test + coverage (fail under 80%)
        run: cargo llvm-cov --workspace --lcov --output-path target/lcov.info --fail-under-lines 80 --ignore-filename-regex 'frb_generated|/lib\.rs|/midi\.rs'
      - name: Build
        run: cargo build --workspace
