name: android

# Compiles the Android build (Flutter + the Rust lib for Android targets via
# cargokit) on every PR. This is the only CI that exercises code gated behind
# `#[cfg(target_os = "android")]` (e.g. JNI_OnLoad) — host jobs never compile it,
# so android-only errors (like the edition-2024 `#[unsafe(no_mangle)]` rule) would
# otherwise only surface at release time.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build debug APK (compiles the Android Rust target)
        working-directory: apps/music
        run: flutter build apk --debug
