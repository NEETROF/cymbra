name: build

# Native-build gate. Compiles the app for every native target (Android + the
# three desktops) — the only CI that exercises cargokit per-platform and code
# gated behind `#[cfg(target_os = ...)]`.
#
# Runs automatically on every PR (and on main): runners are free for public
# repos, so these checks can be required and will reliably satisfy branch
# protection (unlike workflow_dispatch, whose runs don't count toward a PR).
# `workflow_dispatch` is kept for ad-hoc manual runs.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: android
            os: ubuntu-latest
            target: apk
          - label: linux
            os: ubuntu-latest
            target: linux
          - label: macos
            os: macos-latest
            target: macos
          - label: windows
            os: windows-latest
            target: windows
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java (Android)
        if: matrix.label == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Linux build deps
        if: matrix.label == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev ninja-build libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Set up protoc (gRPC codegen)
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate gRPC stubs (protoc)
        working-directory: apps/music
        shell: bash
        run: |
          flutter pub get
          bash tool/gen_grpc.sh
      - name: Generate code (riverpod_generator + freezed)
        working-directory: apps/music
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Build (${{ matrix.label }})
        working-directory: apps/music
        run: flutter build ${{ matrix.target }} --debug
