name: release-please

# Maintains a per-component "Release PR" from Conventional Commits on main.
# Merging it bumps the version (pubspec.yaml / Cargo.toml), updates the
# component CHANGELOG and creates a prefixed tag + GitHub Release
# (e.g. music-v1.1.0). Build/ship workflows can then trigger on that tag.
on:
  push:
    branches: [main]
  workflow_dispatch: # allow re-running release-please manually (regenerate the Release PR/changelog)

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Dedicated token (fine-grained PAT or classic PAT with `repo`) stored
          # as the RELEASE_PLEASE_TOKEN secret. Required because the org policy
          # forbids the default GITHUB_TOKEN from creating PRs; this also makes
          # the Release PR trigger the normal CI workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
