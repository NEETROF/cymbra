name: flutter

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps (native Rust lib via cargokit)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev ninja-build libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Activate Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Format
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: melos run analyze
      - name: Test
        run: melos run test
