name: flutter

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps (native Rust lib via cargokit + Linux desktop + headless display + protoc for gRPC codegen)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev ninja-build libgtk-3-dev libsecret-1-dev clang cmake pkg-config xvfb lcov protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Activate Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      # Format runs before codegen so it only checks hand-written source, not
      # the generated *.g.dart / *.freezed.dart files.
      - name: Format
        run: dart format --output=none --set-exit-if-changed .
      # gRPC stubs are gitignored (like lib/src/rust); regenerate them before
      # analyze/test. Runs after Format so the generated grpc Dart isn't gated.
      - name: Generate gRPC stubs (protoc)
        run: melos run gen-grpc
      - name: Generate code (riverpod_generator + freezed)
        run: melos run generate
      - name: Analyze
        run: melos run analyze
      - name: Riverpod/Freezed lints
        working-directory: apps/music
        run: dart run custom_lint
      - name: Unit + widget tests (with coverage)
        run: melos run test
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      # Integration tests drive the real app (real Rust lib via cargokit) on the
      # Linux desktop engine, headless under Xvfb. Locally: flutter test integration_test -d macos
      - name: Integration tests (Linux desktop, headless via Xvfb)
        working-directory: apps/music
        run: xvfb-run -a flutter test integration_test -d linux --coverage --coverage-path coverage/integration.lcov.info
      - name: Merge coverage (unit/widget + integration)
        run: lcov -a apps/music/coverage/lcov.info -a apps/music/coverage/integration.lcov.info -o apps/music/coverage/merged.lcov.info
      - name: Enforce 80% line coverage
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: apps/music/coverage/merged.lcov.info
          min_coverage: 80
          exclude: "lib/src/rust/** lib/src/grpc/** lib/main.dart **/*.g.dart **/*.freezed.dart"
