name: commitlint

# Enforces Conventional Commits on PR titles (used as the squash-merge commit
# message), which release-please relies on. Pair with "Squash and merge".
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
