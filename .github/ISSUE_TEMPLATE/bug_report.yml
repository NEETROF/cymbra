name: Bug report
description: Report a problem with Cymbra
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: App / component
      placeholder: apps/music
  - type: input
    id: midi
    attributes:
      label: MIDI device (if relevant)
      placeholder: e.g. Yamaha P-125 over USB / USB-OTG
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs (e.g. lines tagged [cymbra-midi] or [cymbra-swift]).
      render: shell
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: app version, Flutter version, OS version
