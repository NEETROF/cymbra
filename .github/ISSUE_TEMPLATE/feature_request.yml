name: Feature request
description: Suggest an idea for Cymbra
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - apps/music
        - engine (crates)
        - backend
        - packages
        - CI / tooling
        - other
