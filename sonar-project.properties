# SonarCloud configuration. Adjust organization/projectKey to your SonarCloud setup.
sonar.organization=neetrof
sonar.projectKey=NEETROF_cymbra
sonar.projectName=Cymbra

# Blocking gate: the `sonar` job passes `-Dsonar.qualitygate.wait=true`, so the
# job waits for SonarCloud's Quality Gate and FAILS if it does not pass. To make
# it block merges, add the `sonar` check to the required status checks in branch
# protection (the hard >=80% line gate also lives in rust.yml / flutter.yml).

# Sources (Rust + Dart). Add crates/ when the shared engine lands.
sonar.sources=apps/music/lib,apps/music/rust/src,backend

# Exclude generated bindings and build/vendor dirs, plus backend non-source
# (dev infra, the observability stack, helper scripts, and SQL migrations — the
# `jobs` ones vendor sqlxmq's mq_* migrations, whose upstream "fix" files
# re-declare whole function bodies; that's vendored DDL, not our logic).
sonar.exclusions=**/frb_generated.rs,**/lib/src/rust/**,**/cargokit/**,**/build/**,**/target/**,**/*.g.dart,**/*.freezed.dart,backend/db/**,backend/observability/**,backend/scripts/**,backend/*/migrations/**

# Coverage exclusions: the Dart IO seams that can only run against real
# platform/network services (gRPC channel + auth interceptor, native
# Google/Apple sign-in SDK) and the generated gRPC stubs. These mirror the
# `--ignore-filename-regex` IO-adapter list applied to the Rust lcov in
# sonar.yml (grpc.rs, interceptor.rs, session.rs, …); their logic is exercised
# through injected fakes, not unit tests. Files with genuine host-testable logic
# (e.g. token_store.dart) stay counted.
sonar.coverage.exclusions=apps/music/lib/services/grpc_client.dart,apps/music/lib/services/oidc_token_source.dart,**/lib/src/grpc/**

# Coverage reports: lcov for both ecosystems. The hard 80% gate lives in CI
# (rust.yml / flutter.yml); these feed SonarCloud for PR decoration only.
# Dart accepts multiple comma-separated reports (unit/widget + integration).
sonar.dart.lcov.reportPaths=apps/music/coverage/lcov.info,apps/music/coverage/integration.lcov.info
sonar.rust.lcov.reportPaths=target/lcov.info
