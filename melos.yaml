name: cymbra

packages:
  - apps/**
  - packages/**

# Don't let Melos manage the flutter_rust_bridge plugin wrapper (auto-generated)
# nor cargokit's internal Dart tool package — they aren't ours to lint/test.
ignore:
  - "apps/*/rust_builder"
  - "**/cargokit/**"
  # Build output (gitignored) contains nested Dart packages (e.g. duplicate
  # `build_tool_runner`s under build/) that otherwise break package discovery
  # after a local build.
  - "**/build/**"

scripts:
  generate:
    description: Run build_runner codegen (riverpod_generator + freezed).
    run: melos exec -- dart run build_runner build --delete-conflicting-outputs
    packageFilters:
      dependsOn: build_runner

  analyze:
    description: Static analysis across all Flutter packages.
    run: melos exec -- flutter analyze
    packageFilters:
      flutter: true

  test:
    description: Run tests (with coverage) across all Flutter packages that have a test/ dir.
    # Goldens are excluded from the cross-platform gate; run them locally with
    # `flutter test --tags golden`.
    run: melos exec -- flutter test --coverage --exclude-tags golden
    packageFilters:
      flutter: true
      dirExists: test

  integration:
    description: >
      Run the end-to-end integration test in a VISIBLE app window (flutter
      drive), so you can watch the real app being driven — unlike
      `flutter test integration_test`, which doesn't foreground the window.
      Defaults to macOS; for another device run the raw `flutter drive` command
      with `-d linux`/`-d chrome`.
    run: >
      melos exec -- flutter drive
      --driver=test_driver/integration_test.dart
      --target=integration_test/app_test.dart
      -d macos
    packageFilters:
      dirExists: integration_test

  format:
    description: Check Dart formatting.
    run: dart format --output=none --set-exit-if-changed .
