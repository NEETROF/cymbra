name: cymbra

packages:
  - apps/**
  - packages/**

# Don't let Melos manage the flutter_rust_bridge plugin wrapper (auto-generated)
# nor cargokit's internal Dart tool package — they aren't ours to lint/test.
ignore:
  - "apps/*/rust_builder"
  - "**/cargokit/**"
  # Build output (gitignored) contains nested Dart packages (e.g. duplicate
  # `build_tool_runner`s under build/) that otherwise break package discovery
  # after a local build.
  - "**/build/**"

scripts:
  gen-grpc:
    description: Generate the Cymbra ID gRPC Dart stubs from the backend protos.
    run: bash apps/music/tool/gen_grpc.sh

  generate:
    description: Run build_runner codegen (riverpod_generator + freezed).
    run: melos exec -- dart run build_runner build --delete-conflicting-outputs
    packageFilters:
      dependsOn: build_runner

  analyze:
    description: Static analysis across all Flutter packages.
    run: melos exec -- flutter analyze
    packageFilters:
      flutter: true

  test:
    description: Run tests (with coverage) across all Flutter packages that have a test/ dir.
    # Goldens are excluded from the cross-platform gate; run them locally with
    # `flutter test --tags golden`.
    run: melos exec -- flutter test --coverage --exclude-tags golden
    packageFilters:
      flutter: true
      dirExists: test

  integration:
    description: Run the e2e integration test headlessly on macOS (fast pass/fail; the window is not shown). To *watch* it, use `integration-watch`.
    run: melos exec -- flutter test integration_test -d macos
    packageFilters:
      dirExists: integration_test

  integration-watch:
    description: >
      Watch the e2e test drive the real app in a VISIBLE iOS simulator, with
      ~1.2s pauses between steps. macOS desktop renders a black window under the
      integration_test binding, so a simulator is required. Boot one first
      (`open -a Simulator`); change the device below if yours differs.
    run: >
      melos exec -- flutter drive
      --driver=test_driver/integration_test.dart
      --target=integration_test/app_test.dart
      --dart-define=WATCH_MS=1200
      -d "iPad Pro"
    packageFilters:
      dirExists: integration_test

  format:
    description: Check Dart formatting.
    run: dart format --output=none --set-exit-if-changed .
