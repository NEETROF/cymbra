# Cymbra ID — local observability stack (task 6.7).
#
# Start:  docker compose -f backend/observability/docker-compose.yml up -d
# Then run the backend with CYMBRA_OTLP_ENABLED=true and
# CYMBRA_OTLP_ENDPOINT=http://localhost:4317.
#
# Grafana: http://localhost:3000 (anonymous admin). See README.md.
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (backend exports here)
      - "4318:4318"   # OTLP HTTP
    depends_on: [tempo, loki]

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports: ["3100:3100"]

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceToMetrics
    extra_hosts:
      # Lets the "Jobs (Postgres)" datasource reach the backend's Postgres
      # (running in the other compose file / on the host) at host.docker.internal.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/jobs:ro
      - ./grafana/alerting.yaml:/etc/grafana/provisioning/alerting/alerting.yaml:ro
    ports: ["3000:3000"]
    depends_on: [prometheus, tempo, loki]
