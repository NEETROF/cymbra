# Grafana datasource provisioning with trace<->logs correlation (task 6.7).
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    jsonData:
      # Jump from a span to its logs in Loki, filtered by trace id.
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    jsonData:
      # Turn a log's trace_id into a clickable link to Tempo.
      derivedFields:
        - name: TraceID
          matcherRegex: 'trace_id"?[:=]"?(\w+)'
          url: '$${__value.raw}'
          datasourceUid: tempo

  # Job-queue observability (design D8; change: add-job-infrastructure). Read-only
  # SQL over the `jobs.*` views. DEV connects as worker_svc against the dev
  # Postgres; production should point this at a dedicated read-only grant.
  - name: Jobs (Postgres)
    type: grafana-postgresql-datasource
    uid: jobs-postgres
    url: host.docker.internal:5432
    user: worker_svc
    jsonData:
      database: cymbra_id
      sslmode: disable
      postgresVersion: 1600
    secureJsonData:
      password: worker_dev_pw
