syntax = "proto3";

package cymbra.user.v1;

// UserService — the user module's public, authenticated account-management
// surface (the caller's identity comes from the internal access token, not the
// request body). Internal port methods (resolve-or-provision, link/unlink,
// effective roles) are in-process Rust APIs used by the auth module, not RPCs.

message Account {
  string user_id = 1;
  optional string display_name = 2;
  string preferences = 3; // JSON object as a string
  int64 version = 4;
  int64 updated_at = 5; // unix seconds
  optional string handle = 6; // unique display handle; null until onboarded
}

message Identity {
  string provider = 1; // local | google | apple
  string subject = 2;
  int64 linked_at = 3;
}

message GetAccountRequest {}

message UpdateAccountRequest {
  optional string display_name = 1;
  string preferences = 2;
  int64 expected_version = 3;
  optional string handle = 4; // set/replace the handle; unchanged when absent
}

message ListIdentitiesRequest {}
message ListIdentitiesResponse { repeated Identity identities = 1; }

message DeleteAccountRequest {}
message DeleteAccountResponse {}

// Advisory pre-check for handle onboarding. The write path (UpdateAccount) is the
// authority that guarantees uniqueness; `available` reflects current state only.
message CheckHandleAvailabilityRequest { string handle = 1; }
message CheckHandleAvailabilityResponse { bool available = 1; }

service UserService {
  rpc GetAccount(GetAccountRequest) returns (Account);
  rpc UpdateAccount(UpdateAccountRequest) returns (Account);
  rpc CheckHandleAvailability(CheckHandleAvailabilityRequest) returns (CheckHandleAvailabilityResponse);
  rpc ListIdentities(ListIdentitiesRequest) returns (ListIdentitiesResponse);
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
}
